openapi: 3.0.3
info:
  title: Event Manager API
  version: "1.0.0"
  description: Event Manager for music の初期API定義
servers:
  - url: http://{HOST}:{API_PORT}/api/v1
    variables:
      HOST:
        default: localhost
      API_PORT:
        default: "8000"
tags:
  - name: Auth
  - name: Users
  - name: Events
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/register:
    post:
      tags: [Auth]
      summary: ユーザー登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: メール重複
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/refresh:
    post:
      tags: [Auth]
      summary: トークン更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [access_token]
                properties:
                  access_token:
                    type: string
  /users/me:
    get:
      tags: [Users]
      summary: ログインユーザー情報取得
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      tags: [Users]
      summary: ユーザー情報更新
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: メール重複
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /events:
    get:
      tags: [Events]
      summary: イベント一覧取得
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, published, cancelled]
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: organizer_id
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      tags: [Events]
      summary: イベント作成
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
  /events/{id}:
    get:
      tags: [Events]
      summary: イベント詳細取得
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: 見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Events]
      summary: イベント更新
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      tags: [Events]
      summary: イベント削除
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 削除成功
  /events/{id}/reservations:
    post:
      tags: [Events]
      summary: イベント予約
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 権限なし
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 重複または定員超過
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /reservations/me:
    get:
      tags: [Events]
      summary: 自分の予約一覧取得
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [reserved, cancelled]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
  /reservations/{id}/cancel:
    patch:
      tags: [Events]
      summary: 予約キャンセル
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "404":
          description: 見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    User:
      type: object
      required: [id, email, first_name, last_name, display_name, user_type]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        display_name:
          type: string
        user_type:
          type: string
          enum: [admin, organizer, performer, audience]
        profile_image_path:
          type: string
          nullable: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name, display_name, user_type]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
        display_name:
          type: string
        user_type:
          type: string
          enum: [organizer, performer, audience]
    AuthResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    UpdateMeRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        display_name:
          type: string
        email:
          type: string
          format: email
    Event:
      type: object
      required:
        - id
        - organizer_id
        - title
        - venue_name
        - venue_address
        - event_date
        - doors_open_time
        - start_time
        - status
      properties:
        id:
          type: string
          format: uuid
        organizer_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        venue_name:
          type: string
        venue_address:
          type: string
        event_date:
          type: string
          format: date
        doors_open_time:
          type: string
        start_time:
          type: string
        end_time:
          type: string
          nullable: true
        ticket_price:
          type: integer
          nullable: true
        capacity:
          type: integer
          nullable: true
        status:
          type: string
          enum: [draft, published, cancelled]
    CreateEventRequest:
      type: object
      required:
        - title
        - venue_name
        - venue_address
        - event_date
        - doors_open_time
        - start_time
        - status
      properties:
        title:
          type: string
        description:
          type: string
        venue_name:
          type: string
        venue_address:
          type: string
        event_date:
          type: string
          format: date
        doors_open_time:
          type: string
        start_time:
          type: string
        end_time:
          type: string
        ticket_price:
          type: integer
        capacity:
          type: integer
        status:
          type: string
          enum: [draft, published]
    UpdateEventRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        venue_name:
          type: string
        venue_address:
          type: string
        event_date:
          type: string
          format: date
        doors_open_time:
          type: string
        start_time:
          type: string
        end_time:
          type: string
        ticket_price:
          type: integer
        capacity:
          type: integer
        status:
          type: string
          enum: [draft, published, cancelled]
    Reservation:
      type: object
      required:
        - id
        - event_id
        - user_id
        - reservation_number
        - status
        - reserved_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
        event_id:
          type: string
        user_id:
          type: string
        reservation_number:
          type: string
        status:
          type: string
          enum: [reserved, cancelled]
        reserved_at:
          type: string
          format: date-time
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
